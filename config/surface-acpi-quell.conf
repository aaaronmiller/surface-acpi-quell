# Surface ACPI Quell — Configuration
# This file is sourced by bash watcher and read by the indicator.
# Path: /etc/surface-acpi-quell/config.conf

# ── GPE Configuration ──────────────────────────────────────
# List of GPEs (hex) to disable on every check cycle.
# Auto-detect will also scan for additional high-count GPEs.
GPE_LIST="68 69 6A 6B 6C 6D 6E 6F"

# Auto-detect threshold: if a GPE's count exceeds this per-second
# rate, it gets added to the disable list dynamically.
# Set to 0 to disable auto-detect.
GPE_AUTO_DETECT_RATE=100

# ── IRQ 9 Monitoring ───────────────────────────────────────
# IRQ 9 rate threshold (per second). If the rate exceeds this,
# the watcher considers the fix degraded and tries to re-mask.
IRQ_THRESHOLD=500

# ── ACPI Error Monitoring ──────────────────────────────────
# Maximum ACPI Error messages per minute before alerting.
# If errors exceed this despite stable IRQ 9, something else is wrong.
ACPI_ERR_THRESHOLD=100

# ── Kernel Module ──────────────────────────────────────────
# ACPI SCI IRQ number (typically 9 on x86).
IRQ_NUMBER=9

# How often (ms) the kernel module re-masks the IRQ.
# Default: 10000 (10 seconds)
MODULE_CHECK_INTERVAL_MS=10000

# ── Watcher ────────────────────────────────────────────────
# Interval between watcher checks (seconds).
# The systemd timer controls this; this value is for reference.
WATCHER_INTERVAL=60

# ── Safety ─────────────────────────────────────────────────
# Require Surface hardware to load the IRQ mask module.
# Set to "false" to allow on non-Surface hardware (GPE mask only).
REQUIRE_SURFACE_HARDWARE=true

# ── Graceful Degradation ───────────────────────────────────
# Monitor these sysfs paths for changes. If they don't update
# within the expected interval, IRQ 9 masking may be causing issues.
# Format: "label:path:max_age_seconds"
MONITOR_PATHS="battery:/sys/class/power_supply/BAT0/capacity:300
thermal:/sys/class/thermal/thermal_zone0/temp:300"

# ── Data Logging ───────────────────────────────────────────
# Maximum history entries in the ring buffer.
HISTORY_MAX_ENTRIES=2000

# ── Notification ───────────────────────────────────────────
# Enable desktop notifications.
ENABLE_NOTIFICATIONS=true

# Enable wall (terminal broadcast) notifications.
ENABLE_WALL=true
